spring:
  application:
    name: autowash-pro
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=}
  expiration: 86400000
  refresh-expiration: 604800000

resend:
  api-key: ${RESEND_API_KEY:dummy-key-for-dev}

supabase:
  url: ${SUPABASE_URL:http://localhost}
  key: ${SUPABASE_ANON_KEY:dummy-key}

server:
  port: 8080
