version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autowash_postgres
    environment:
      POSTGRES_DB: autowash_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: autowash123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autowash_redis
    ports:
      - '6379:6379'

volumes:
  postgres_data:
